<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Gradiente de fondo premium oscuro -->
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#0f172a" />
    </radialGradient>
    <!-- Gradiente de bordes brillantes -->
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Fondo con esquinas redondeadas -->
  <rect width="512" height="512" rx="112" fill="url(#bg)" stroke="url(#neonGlow)" stroke-width="8" />
  
  <!-- Círculo brillante posterior -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#38bdf8" stroke-dasharray="8 16" stroke-width="4" opacity="0.3" />

  <g filter="url(#glow)">
    <!-- Silueta del Balón de Fútbol Estilizado en 3D/Neon -->
    <circle cx="256" cy="256" r="110" fill="none" stroke="url(#neonGlow)" stroke-width="8" />
    
    <!-- Costuras de balón de fútbol -->
    <path d="M 256,146 L 256,176 M 256,336 L 256,366 M 146,256 L 176,256 M 336,256 L 366,256" stroke="#818cf8" stroke-width="6" stroke-linecap="round" />
    
    <!-- Gajos internos estilizados -->
    <polygon points="256,206 296,236 281,286 231,286 216,236" fill="none" stroke="#38bdf8" stroke-width="6" />
    <path d="M 256,206 L 256,176 M 296,236 L 326,246 M 281,286 L 301,316 M 231,286 L 211,316 M 216,236 L 186,246" stroke="#38bdf8" stroke-width="6" stroke-linecap="round" />
  </g>

  <!-- Brillos adicionales decorativos -->
  <circle cx="160" cy="160" r="12" fill="#38bdf8" filter="url(#glow)"/>
  <circle cx="352" cy="352" r="16" fill="#818cf8" filter="url(#glow)"/>
  <circle cx="370" cy="130" r="8" fill="#6366f1" filter="url(#glow)"/>
</svg>
